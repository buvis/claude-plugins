name: validate-versions

# Catch the version-clobber bug: every version in marketplace.json must match
# the real upstream .claude-plugin/plugin.json of each plugin repo.
on:
  push:
    paths:
      - '.claude-plugin/marketplace.json'
      - 'scripts/validate-versions.mjs'
      - '.github/workflows/validate-versions.yml'
  pull_request:
    paths:
      - '.claude-plugin/marketplace.json'
      - 'scripts/validate-versions.mjs'
      - '.github/workflows/validate-versions.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: node scripts/validate-versions.mjs
